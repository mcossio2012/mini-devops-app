version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./active_backend.conf:/etc/nginx/active_backend.conf
    networks:
      - devops-net
    restart: unless-stopped

networks:
  devops-net:
    driver: bridge