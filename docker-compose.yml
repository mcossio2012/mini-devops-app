version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./active_backend.conf:/etc/nginx/active_backend.conf
    networks:
      - devops-net
    restart: unless-stopped

  app_blue:
    image: ${DOCKERHUB_USERNAME}/mini-devops-app:latest
    container_name: app_blue
    networks:
      - devops-net
    restart: unless-stopped

  app_green:
    image: ${DOCKERHUB_USERNAME}/mini-devops-app:latest
    container_name: app_green
    networks:
      - devops-net
    restart: unless-stopped

networks:
  devops-net:
    driver: bridge