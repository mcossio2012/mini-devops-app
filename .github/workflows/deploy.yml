name: Deploy to Raspberry

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run:
          cd /home/adminpi/mini-devops-app
          git pull
          docker-compose down
          docker-compose up -d --build
