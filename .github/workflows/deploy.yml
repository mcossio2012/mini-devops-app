name: Deploy to Raspberry

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 192.168.1.235
          username: adminpi
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/adminpi/mini-devops-app
            git pull
            docker compose down
            docker compose up -d --build
