name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:latest

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull and run container
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:latest
          docker stop app || true
          docker rm app || true
          docker run -d -p 5000:5000 --name app ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:latest
