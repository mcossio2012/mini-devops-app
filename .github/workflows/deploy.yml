name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:${{ steps.vars.outputs.TAG }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:latest \
            --push .

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull and run container
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:${{ needs.build.outputs.tag }}
          docker stop app || true
          docker rm app || true
          docker run -d -p 5000:5000 --name app ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:${{ needs.build.outputs.tag }}
