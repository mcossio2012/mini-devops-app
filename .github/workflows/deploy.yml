name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:${{ steps.vars.outputs.TAG }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:latest \
            --push .

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Deploy with smart rollback
        run: |
          TAG=${{ needs.build.outputs.tag }}
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app

          echo "Deployando versión $TAG"

          # 1. Guardar versión actual
          CURRENT=$(docker ps --format "{{.Image}}" | grep mini-devops-app || true)
          echo "Versión actual: $CURRENT"

          # 2. Traer nueva imagen
          docker pull $IMAGE:$TAG

          # 3. Levantar nueva versión
          docker stop app || true
          docker rm app || true
          docker run -d -p 5000:5000 --name app $IMAGE:$TAG

          # 4. Esperar a que arranque
          echo "Esperando 10 segundos..."
          sleep 10

          # 5. Verificar health
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' app 2>/dev/null || echo "fail")

          echo "Estado del container: $STATUS"

          # 6. Si falla → rollback
          if [ "$STATUS" != "healthy" ]; then
            echo "❌ Falló el deploy, haciendo rollback..."

            docker stop app || true
            docker rm app || true

            if [ -n "$CURRENT" ]; then
              docker run -d -p 5000:5000 --name app $CURRENT
              echo "✅ Volvió a $CURRENT"
            else
              echo "⚠️ No había versión previa"
            fi

            exit 1
          fi

          echo "✅ Deploy OK"
