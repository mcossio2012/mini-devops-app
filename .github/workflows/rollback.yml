name: Rollback Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (ej: a1b2c3d)'
        required: true

jobs:
  rollback:
    runs-on: self-hosted

    steps:
      - name: Deploy selected version
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:${{ github.event.inputs.tag }}
          docker stop app || true
          docker rm app || true
          docker run -d -p 5000:5000 --name app ${{ secrets.DOCKERHUB_USERNAME }}/mini-devops-app:${{ github.event.inputs.tag }}
